<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
    <title>Verification</title>
    <style>
        body {
            margin: 0;
            background-color: #F4F1DE;
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        .page {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        .left {
            width: 50%;
            background-image: url(./regiester.png);
            background-size: 160%;
            background-position: left center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 80px;
            position: relative;
        }
        .left h1 {
            font-size: 56px;
            font-weight: 900;
            color: black;
            text-shadow: none;
            font-family: "Playfair Display", serif;
            letter-spacing: 2px;
            margin: 0;
        }

        .right {
        width: 50%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

        .form-container {
            width: 80%;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        input {
            width: 420px;
            padding: 18px 24px;
            margin-bottom: 20px;
            border-radius: 25px;
            border: 2px solid gray;
            outline: none;
            font-size: 17px;
    }

        .forgot {
            display: block;
            text-align: right;
            margin-top: 8px;
            color: orangered;
            font-size: 14px;
            text-decoration: none;
        }

        .confirm-btn {
            display: block;
            width: 260px;
            display: block;
            margin: 15px auto;
            padding: 15px;
            border-radius: 25px;
            border: none;
            background: orangered;
            color: white;
            cursor: pointer;
            font-size: 17px;
    }

        .confirm-btn:hover {
            background: #6848e0;
        }
        #errorMessage{
            color:red;
            font-size:14px;
            margin:5px 0;
}
    </style>
</head>

<body>

    <div class="page">

        <div class="left"></div>

        <div class="right">
            <div class="form-container">

                <h1
                    style="font-size: 48px;">
                    Verification</h1>

                <form id="verificationForm">
                    <input type="text" id="code" placeholder="Enter Verification Code">

                    <p id="errorMessage"></p>

                    <button type="submit" class="confirm-btn">Confirm</button>
</form>
        </div>
        </div>

    </div>
    <script type="module" src="./validiation_verifiction.js"></script>

</body>
</html>
