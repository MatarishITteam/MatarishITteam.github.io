<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <title>YumYard Sign Up</title>
  <style>
    body {
      margin: 0;
      background-color: #F4F1DE;
      font-family: Arial, sans-serif;
      height: 100vh;
    }

    .page {
      display: flex;
      width: 100%;
      height: 100vh;
    }
    .signup-link {
      color:orangered;
      text-decoration: none;
    }


    .left {
      width: 50%;
      background-image: url(./regiester.png);
      background-size: 160%;
      background-position: left center;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 80px;
      position: relative;
    }



    .left h1 {
      font-size: 56px;
      font-weight: 900;
      color: black;
      text-shadow: none;
      font-family: "Playfair Display", serif;
      letter-spacing: 2px;
      margin: 0;
    }

    .right {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .right h2 {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .right input {
      display: block;
      width: 420px;
      padding: 18px 24px;
      margin-bottom: 20px;
      border: 1.5px solid #2B2118;
      border-radius: 25px;
      font-size: 17px;
      font-family: Arial, sans-serif;
      outline: none;
      background: white;
    }

    .right input::placeholder {
      color: #aaa;
    }

    .btn {
      margin-top: 8px;
      width: 260px;
      padding: 15px;
      background-color: #FB6107;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 17px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      margin-left: 110px;
    }

    .btn:hover {
      background-color: #e05500;
    }
    #errorMsg{
      color:red;
      font-size:14px;
      margin-bottom:15px;
}
  </style>
</head>
<body>

<div class="page">

  <div class="left">
    
  </div>

  <div class="right">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 900; color: #2B2118; margin: 0 0 4px 0; letter-spacing: 1px;">Welcome</h1>
    <h2>Sign up</h2>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Enter Your Username" />
      <input type="email" id="email" placeholder="Enter Your Email" />
      <input type="password" id="password" placeholder="Enter Your Password" />
      <input type="password" id="confirmPassword" placeholder="Confirm Your Password" />

      <p id="errorMsg"></p>

      <button type="submit" class="btn">Confirm</button>
</form>
<p class="signup-text">
        Already have an account?
      <a href="yummy-signin.html" class="signup-link">Login</a></p>
    
  </div>

</div>
<script type="module" src="validiation_sigup.js"></script>
</body>
</html>
