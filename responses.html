<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="responses.css">
    <title>Responses</title>
</head>
<body>
    <div>
        <nav>
            <h1 class="logo">YumYard</h1>
                <div style="display: flex; gap: 60px; justify-content: center; margin-right: 20px; margin-left: 160px;">
                        <a href="index.html">Home</a>
                        <a href="Recipes.html">Recipes</a>
                        <a href="About.html">About</a>
                        <a href="Contact.html">Contact</a>
                        <a href ="responses.html" class = "active1" id ="responsesLink" style="display: none;">Responses</a>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;">
                    <p style ="font-size: 17px;" id="userName" style="font-weight: bold;"></p>
                    <a href="yummy-signin.html" id="loginBtn" class ="signin">Sign in</a>
                    <button id="logoutBtn" class="signin">Logout</button>
                    <button id="themeToggle">🌙</button>

                </div>
                
        </nav>
    </div>
    <main>
        <h2>Admin Responses</h2>
        <p>Here you can view and manage user responses.</p>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="responsesTableBody">
           
            </tbody>
    </main>
    <footer>
        <h2>Cook . Enjoy , Repeat</h2>
        <div style="display: flex; gap: 140px; margin-right: 7%">
            <a href="https://facebook.com/" class="fab fa-facebook"></a>
            <a href="https://instagram.com/" class="fab fa-instagram"></a>
            <a href="https://twitter.com/" class="fab fa-x"></a>
        </div>
        <p style="font-size: 20px; font-weight: bold;">&copy; 2026</p>
    </footer>

  
    <script src="themes.js"></script>

<script src="auth.js"></script>

<script>
const tableBody = document.getElementById("responsesTableBody");


let responses = JSON.parse(localStorage.getItem("responses")) || [];


if (responses.length === 0) {
    const row = document.createElement("tr");
    row.innerHTML = `<td colspan="3">No responses yet</td>`;
    tableBody.appendChild(row);
} else {
    responses.forEach(res => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${res.name}</td>
            <td>${res.email}</td>
            <td>${res.message}</td>
        `;

        tableBody.appendChild(row);
    });
}
</script>

</body>
</html>
