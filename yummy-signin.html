<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <title>sign in</title>
  <style>
    body {
      margin: 0;
      background-color: #F4F1DE;
      font-family: Arial, sans-serif;
      height: 100vh;
    }

    .page {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* LEFT SIDE */
    .left {
      width: 50%;
      background-image: url(./regiester.png);
      background-size: 160%;
      background-position: left center;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 80px;
      position: relative;
    }



    .left h1 {
      font-size: 56px;
      font-weight: 900;
      color: black;
      text-shadow: none;
      font-family: "Playfair Display", serif;
      letter-spacing: 2px;
      margin: 0;
    }

    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      width: 80%;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 25px;
      border: 2px solid gray;
      outline: none;
    }

    .forgot {
      display: block;
      text-align: right;
      margin-top: 8px;
      color: orangered;
      font-size: 14px;
      text-decoration: none;
    }

    .confirm-btn {
      display: block;
      margin: 15px auto;
      padding: 8px 30px;
      border-radius: 20px;
      border: none;
      background:orangered;
      color: white;
      cursor: pointer;
    }

    .confirm-btn:hover {
      background: #6848e0;
    }

    .signup-text {
      text-align: center;
      margin-top: 10px;
    }

    .signup-link {
      color:orangered;
      text-decoration: none;

      .welcome{
  color: blue;
  margin-bottom: -10px;
  font-size: 28px;
}
    }
  </style>
</head>

<body>

<div class="page">

  <div class="left"></div>

  <div class="right">
    <div class="form-container">

    <h1 style="font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 900; color: #2B2118; margin: 0 0 4px 0; letter-spacing: 1px;">Welcome</h1>
    <h2>Sign in</h2>

      <input type="email" placeholder="Enter Your Email" required>
      <input type="password" placeholder="Enter Your Password" required>

      <a href="./yumyard_forgot_password.html" class="forgot">Forgot Your Password?</a>

      <button class="confirm-btn">Confirm</button>

      <p class="signup-text">
        Don’t have an account?
        <a href="./yumyard_signup.html" class="signup-link">Sign Up</a>
      </p>

    </div>
  </div>

</div>

</body>
</html>
