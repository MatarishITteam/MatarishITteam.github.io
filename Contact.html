<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="Contact.css">
    <title>Contact Page</title>
</head>
<body>
    <div>
        <nav>
            <h1 class="logo">YumYard</h1>
                <div style="display: flex; gap: 60px; justify-content: center; margin-right: 20px; margin-left: 160px;">
                        <a href="index.html">Home</a>
                        <a href="Recipes.html">Recipes</a>
                        <a href="About.html">About</a>
                        <a href="Contact.html" class = "active4">Contact</a>
                        <a href ="responses.html" id ="responsesLink" style="display: none;">Responses</a>
                </div> 
                <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;">
                    <p style ="font-size: 17px;" id="userName" style="font-weight: bold;"></p>
                    <a href="yummy-signin.html" id="loginBtn" class ="signin">Sign in</a>
                    <button id="logoutBtn" class="signin">Logout</button>
                    <button id="themeToggle">🌙</button> 
                </div>
                
        </nav>
    </div>

    <span></span>
    <div class="container">
        <div class = "contact-image">
            <img src="./Contact.jpg" alt="Contact Us">
        </div>
        <div class ="contact-form" id ="contactForm">
            <h2>Need Help? Contact US</h2>
            <form>
                <input type="text" placeholder="Enter Your Name" id ="name">
                <input type="email" placeholder="Enter Your Email" id ="email">
                <textarea placeholder="Enter Your Message" id="message"></textarea>
                <button>Send</button>
            </form>
        </div>
        
        </div>
    </span>
    <footer>
        <h2>Cook . Enjoy , Repeat</h2>
        <div style="display: flex; gap: 140px; margin-right: 7%">
            <a href="https://facebook.com/" class="fab fa-facebook"></a>
            <a href="https://instagram.com/" class="fab fa-instagram"></a>
            <a href="https://twitter.com/" class="fab fa-x"></a>
        </div>
        <p style="font-size: 20px; font-weight: bold;">&copy; 2026</p>
    </footer>  
    <script src="themes.js"></script>

<script src="auth.js"></script>

<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();
    if(!name || !email || !message){
        alert("All fields are required");
        return;
    }
    let responses = JSON.parse(localStorage.getItem("responses")) || [];
    responses.push({
        name,
        email,
        message,
        date: new Date().toLocaleString()
    });
    localStorage.setItem("responses", JSON.stringify(responses));
    document.getElementById("successMsg").textContent = "Message sent!";
    form.reset();
});
</script>

</body>
</html>
